<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>raphmovie - Letterboxd Visualizer</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #141414;
      color: #eaeaea;
      text-align: center;
      padding: 20px;
    }
    .header-section {
      margin-bottom: 40px;
    }
    input[type="file"] {
      background-color: #333;
      color: white;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    /* The new Green Go Button */
    #goBtn {
      display: none; /* Hidden until a file is chosen */
      background-color: #4CAF50; 
      color: white;
      border: none;
      padding: 10px 24px;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 10px;
      transition: background-color 0.2s;
    }
    #goBtn:hover {
      background-color: #45a049;
    }
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    /* We changed the card to act like a clickable link! */
    .movie-card {
      background-color: #222;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      text-align: left;
      transition: transform 0.2s;
      text-decoration: none; /* Removes the blue underline from links */
      color: inherit; /* Keeps the text white */
      display: block;
      cursor: pointer;
    }
    .movie-card:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4); /* Adds a subtle green glow on hover */
    }
    .movie-card img {
      width: 100%;
      height: 330px;
      object-fit: cover;
      display: block;
    }
    .movie-info {
      padding: 15px;
    }
    .movie-info h3 {
      margin: 0 0 5px 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .movie-info p {
      margin: 4px 0;
      font-size: 0.85rem;
      color: #bbb;
    }
    .tag {
      display: inline-block;
      background-color: #444;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      margin-top: 8px;
      color: #fff;
    }
    #loading {
      display: none;
      font-size: 1.2rem;
      color: #4CAF50;
      margin: 20px 0;
    }
    #loadMoreBtn {
      display: none;
      background-color: #e50914;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
      margin: 20px auto 60px auto;
      transition: background-color 0.2s;
    }
    #loadMoreBtn:hover {
      background-color: #f40612;
    }
  </style>
</head>
<body>

  <div class="header-section">
    <h1>🎬 RaphMovie Catalogue</h1>
    <p>Upload your Letterboxd CSV to generate your visual database.</p>
    
    <input type="file" id="csvFileInput" accept=".csv">
    <button id="goBtn">Go</button>
    
    <p id="loading">Loading movies... please wait.</p>
  </div>

  <div class="movie-grid" id="movie-container"></div>
  <button id="loadMoreBtn">Load More Movies</button>

    const loadingText = document.getElementById('loading');

    let allMovies = [];

    fileInput.addEventListener('change', function(event) {
      if (event.target.files.length > 0) {
        goBtn.style.display = 'inline-block';
      } else {
        goBtn.style.display = 'none';
      }
    });

    // 3. Wait for the user to click "Go" to start reading the file
    goBtn.addEventListener('click', function() {
      const file = fileInput.files[0];
      if (!file) return;

      goBtn.style.display = 'none'; // Hide the Go button once clicked
      container.innerHTML = ''; 
      
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          allMovies = results.data.filter(row => row['Name'] && row['Year']);
          currentIndex = 0; 
          loadNextBatch();
        }
      });
    });
