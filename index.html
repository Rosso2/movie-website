<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>raphmovie - Letterboxd Visualizer</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #141414;
      color: #eaeaea;
      text-align: center;
      padding: 20px;
    }
    .header-section {
      margin-bottom: 40px;
    }
    input[type="file"] {
      background-color: #333;
      color: white;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .movie-card {
      background-color: #222;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      text-align: left;
      transition: transform 0.2s;
    }
    .movie-card:hover {
      transform: scale(1.03);
    }
    .movie-card img {
      width: 100%;
      height: 330px;
      object-fit: cover;
      display: block;
    }
    .movie-info {
      padding: 15px;
    }
    .movie-info h3 {
      margin: 0 0 5px 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .movie-info p {
      margin: 4px 0;
      font-size: 0.85rem;
      color: #bbb;
    }
    .tag {
      display: inline-block;
      background-color: #444;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      margin-top: 8px;
      color: #fff;
    }
    #loading {
      display: none;
      font-size: 1.2rem;
      color: #4CAF50;
    }
  </style>
</head>
<body>

  <div class="header-section">
    <h1>🎬 raphmovie Catalogue</h1>
    <p>Upload your Letterboxd CSV to generate your visual database.</p>
    <input type="file" id="csvFileInput" accept=".csv">
    <p id="loading">Reading database and fetching posters...</p>
  </div>

  <div class="movie-grid" id="movie-container"></div>

  <script>
    // 1. Paste your TMDB API Key here!
    const API_KEY = 'f6b6cac733975d8c7f6a17ceba13fcba';
    
    const fileInput = document.getElementById('csvFileInput');
    const container = document.getElementById('movie-container');
    const loadingText = document.getElementById('loading');

    // 2. Listen for when the user uploads a file
    fileInput.addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (!file) return;

      container.innerHTML = ''; // Clear old movies
      loadingText.style.display = 'block'; // Show loading text

      // 3. Use PapaParse to read the CSV
      Papa.parse(file, {
        header: true, // Tells the parser the first row contains column names (Name, Year, etc.)
        skipEmptyLines: true,
        complete: async function(results) {
          const movies = results.data;
          
          // Grab only the first 12 movies to prevent API blocking
          const moviesToLoad = movies.slice(0, 12);

          // Loop through each movie in the CSV
          for (let row of moviesToLoad) {
            const title = row['Name'];
            const year = row['Year'];
            
            if (title && year) {
              await fetchAndDisplayMovie(title, year);
            }
          }
          loadingText.style.display = 'none'; // Hide loading text when done
        }
      });
    });

    // 4. Function to ask TMDB for the movie details
    async function fetchAndDisplayMovie(title, year) {
      try {
        // Step A: Search for the movie to get its TMDB ID
        const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(title)}&year=${year}`;
        const searchRes = await fetch(searchUrl);
        const searchData = await searchRes.json();

        if (searchData.results && searchData.results.length > 0) {
          const movieId = searchData.results[0].id;

          // Step B: Use the ID to get extra details (Director, Country, Genres)
          const detailsUrl = `https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&append_to_response=credits`;
          const detailsRes = await fetch(detailsUrl);
          const movieData = await detailsRes.json();

          // Extract the data we want
          const poster = movieData.poster_path ? `https://image.tmdb.org/t/p/w500${movieData.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Poster';
          const genres = movieData.genres.map(g => g.name).join(', ');
          const country = movieData.production_countries.length > 0 ? movieData.production_countries[0].name : 'Unknown Country';
          
          // Find the Director in the credits array
          const directorObj = movieData.credits.crew.find(person => person.job === 'Director');
          const director = directorObj ? directorObj.name : 'Unknown Director';

          // Step C: Build the HTML card
          const card = document.createElement('div');
          card.className = 'movie-card';
          card.innerHTML = `
            <img src="${poster}" alt="${title}">
            <div class="movie-info">
              <h3>${title} (${year})</h3>
              <p><strong>Director:</strong> ${director}</p>
              <p><strong>Country:</strong> ${country}</p>
              <span class="tag">${genres.split(',')[0]}</span> </div>
          `;
          container.appendChild(card);
        }
      } catch (error) {
        console.error(`Failed to load ${title}:`, error);
      }
    }
  </script>

</body>
</html>
